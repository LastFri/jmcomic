<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jmcomic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  }
  .window {
    width: 400px;
    height: 400px;
    background: #f5f5f5;
    border: 1px solid #ccc;
    border-radius: 4px;
    position: relative;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  /* ── 文本展示区 ── */
  .text-area {
    position: absolute;
    left: 10px; top: 10px;
    width: 380px; height: 230px;
    background: #fff;
    border: 1px solid #bbb;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 15px;
    color: #333;
    white-space: pre-line;
    text-align: center;
    padding: 12px;
    user-select: none;
  }

  /* ── 小关闭按钮 x ── */
  .close-small {
    position: absolute;
    left: 367px; top: 13px;
    width: 20px; height: 15px;
    background: #fff;
    border: none;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    color: #888;
    display: none;
    line-height: 1;
    padding: 0;
  }
  .close-small:hover { color: #333; }

  /* ── 主操作按钮 ── */
  .btn-main {
    position: absolute;
    left: 100px; top: 250px;
    width: 200px; height: 30px;
    border: 1px solid #aaa;
    background: #e8e8e8;
    cursor: pointer;
    font-size: 14px;
    border-radius: 3px;
  }
  .btn-main:hover { background: #ddd; }
  .btn-main:disabled { color: #666; cursor: default; }

  /* ── 线路按钮 ── */
  .line-btn {
    position: absolute;
    left: 150px;
    width: 100px; height: 30px;
    border: 1px solid #aaa;
    background: #e8e8e8;
    cursor: pointer;
    font-size: 13px;
    border-radius: 3px;
    display: none;
  }
  .line-btn:hover { background: #ddd; }
</style>
</head>
<body>

<div class="window">
  <div class="text-area" id="textArea">
    广告位招租
  </div>
  <button class="close-small" id="closeSmallBtn" title="关闭广告">✕</button>
  <button class="btn-main" id="btnMain"></button>
  <button class="line-btn" id="line1" style="top:250px">線路1  顺畅</button>
  <button class="line-btn" id="line2" style="top:290px">線路2  顺畅</button>
  <button class="line-btn" id="line3" style="top:330px">線路3  顺畅</button>
  <button class="line-btn" id="line4" style="top:370px">線路4  顺畅</button>
</div>

<script>
const TARGET_URL = "https://www.bilibili.com/video/BV1GJ411x7h7/?spm_id_from=333.337.search-card.all.click";

const textArea   = document.getElementById('textArea');
const closeSmall = document.getElementById('closeSmallBtn');
const btnMain    = document.getElementById('btnMain');
const lineBtns   = [
  document.getElementById('line1'),
  document.getElementById('line2'),
  document.getElementById('line3'),
  document.getElementById('line4'),
];

// ─── 阶段 0：倒计时 ───
let countdown = 5;
btnMain.textContent = '广告可在' + countdown + '秒后关闭';
btnMain.disabled = true;

const timer = setInterval(() => {
  countdown--;
  if (countdown > 0) {
    btnMain.textContent = '广告可在' + countdown + '秒后关闭';
  } else {
    clearInterval(timer);
    btnMain.textContent = '关闭广告';
    btnMain.disabled = false;
    // 2 秒后显示小关闭按钮
    setTimeout(() => { closeSmall.style.display = 'block'; }, 2000);
  }
}, 1000);

// ─── 阶段 1：点击"关闭广告"→ 打开目标链接 ───
btnMain.addEventListener('click', () => {
  if (btnMain.disabled) return;
  window.open(TARGET_URL, '_blank');
});

// ─── 阶段 2：点击小 x → 切换到线路选择 ───
closeSmall.addEventListener('click', () => {
  textArea.innerHTML = '請選擇網路<br><br>＊如果不能連結或不能截圖，請嘗試切換線路＊';
  closeSmall.style.display = 'none';
  btnMain.style.display = 'none';
  lineBtns.forEach(b => b.style.display = 'block');
});

// ─── 阶段 3：线路按钮 → 打开目标链接 ───
lineBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    window.open(TARGET_URL, '_blank');
  });
});
</script>

</body>
</html>
